<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Solar System - Advanced</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    perspective: 1200px; /* 🔥 3D depth */
}

/* 🌌 BACKGROUND */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('./texture/2k_stars_milky_way.jpg') no-repeat center/cover;
    z-index: -1;
}

.solar-system {
    position: relative;
    width: 100vw;
    height: 100vh;
    transform-style: preserve-3d;
    transition: transform 0.1s ease;
}

/* ☀️ SUN */
.sun {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 130px;
    height: 130px;
    background: url('./texture/2k_sun.jpg') center/cover;
    transform: translate(-50%, -50%) translateZ(50px);
    border-radius: 50%;
    box-shadow: 0 0 80px orange, 0 0 120px red;
}

/* ORBITS */
.orbit {
    position: absolute;
    top: 50%;
    left: 50%;
    border: 1px dashed rgba(255,255,255,0.2);
    border-radius: 50%;
    transform: translate(-50%, -50%);
}

/* PLANETS */
.planet {
    position: absolute;
    top: 50%;
    left: 100%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
}

/* ORBIT SPEEDS */
.mercury-orbit { width: 150px; height: 150px; animation: rotate 4s linear infinite; }
.venus-orbit   { width: 200px; height: 200px; animation: rotate 7s linear infinite; }
.earth-orbit   { width: 260px; height: 260px; animation: rotate 10s linear infinite; }
.mars-orbit    { width: 320px; height: 320px; animation: rotate 14s linear infinite; }
.jupiter-orbit { width: 400px; height: 400px; animation: rotate 20s linear infinite; }
.saturn-orbit  { width: 480px; height: 480px; animation: rotate 26s linear infinite; }
.uranus-orbit  { width: 560px; height: 560px; animation: rotate 32s linear infinite; }
.neptune-orbit { width: 640px; height: 640px; animation: rotate 40s linear infinite; }

/* PLANET TEXTURES */
.mercury { width: 15px; height: 15px; background: url('./texture/2k_mercury.jpg') center/cover; }
.venus   { width: 22px; height: 22px; background: url('./texture/2k_venus_atmosphere.jpg') center/cover; }
.earth   { width: 25px; height: 25px; background: url('./texture/2k_earth_daymap.jpg') center/cover; }
.mars    { width: 20px; height: 20px; background: url('./texture/2k_mars.jpg') center/cover; }
.jupiter { width: 45px; height: 45px; background: url('./texture/2k_jupiter.jpg') center/cover; }
.saturn  { width: 40px; height: 40px; background: url('./texture/2k_saturn.jpg') center/cover; }
.uranus  { width: 30px; height: 30px; background: url('./texture/2k_uranus.jpg') center/cover; }
.neptune { width: 30px; height: 30px; background: url('./texture/2k_neptune.jpg') center/cover; }

/* SATURN RING */
.saturn::after {
    content: "";
    position: absolute;
    width: 70px;
    height: 70px;
    border: 2px solid rgba(200,200,200,0.5);
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(25deg);
}

/* ROTATION */
@keyframes rotate {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
}
</style>

</head>

<body>

<div class="solar-system">
    <div class="sun"></div>

    <div class="orbit mercury-orbit"><div class="planet mercury"></div></div>
    <div class="orbit venus-orbit"><div class="planet venus"></div></div>
    <div class="orbit earth-orbit"><div class="planet earth"></div></div>
    <div class="orbit mars-orbit"><div class="planet mars"></div></div>
    <div class="orbit jupiter-orbit"><div class="planet jupiter"></div></div>
    <div class="orbit saturn-orbit"><div class="planet saturn"></div></div>
    <div class="orbit uranus-orbit"><div class="planet uranus"></div></div>
    <div class="orbit neptune-orbit"><div class="planet neptune"></div></div>
</div>

<!-- ✅ JS OUTSIDE -->
<script src="script/main.js"></script>

</body>
</html>
